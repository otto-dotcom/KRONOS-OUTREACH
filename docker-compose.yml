version: '3.8'

services:
  n8n:
    image: n8nio/n8n:1.76.1
    container_name: kronos-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      # Basic config
      - N8N_HOST=${N8N_HOST:-n8n.kronosautomations.com}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_HOST:-n8n.kronosautomations.com}/
      - GENERIC_TIMEZONE=Europe/Zurich

      # Security
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?N8N_PASSWORD must be set in .env}

      # Performance
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_METRICS=true
      # Database (SQLite by default, or use PostgreSQL below)
      # - DB_TYPE=postgresdb
      # - DB_POSTGRESDB_HOST=postgres
      # - DB_POSTGRESDB_PORT=5432
      # - DB_POSTGRESDB_DATABASE=n8n
      # - DB_POSTGRESDB_USER=n8n
      # - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - kronos-network

  # Optional: PostgreSQL for better performance at scale
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: kronos-postgres
  #   restart: always
  #   environment:
  #     - POSTGRES_USER=n8n
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
  #     - POSTGRES_DB=n8n
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - kronos-network

  # Optional: Caddy for automatic SSL
  caddy:
    image: caddy:2-alpine
    container_name: kronos-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - kronos-network
    depends_on:
      - n8n

volumes:
  n8n_data:
  caddy_data:
  caddy_config:
    # postgres_data:

networks:
  kronos-network:
    driver: bridge
